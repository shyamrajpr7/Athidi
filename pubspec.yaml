name: athidhi
description: Preserving Tradition, Digitalizing Hospitality.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Navigation
  go_router: ^13.2.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.9


  # HTTP & API
  dio: ^5.4.1

  # Google Maps
  google_maps_flutter: ^2.6.0

  # Local storage
  shared_preferences: ^2.2.2

  # Image handling
  image_picker: ^1.0.7

  # URL launcher (for maps, UPI, calendar)
  url_launcher: ^6.2.5

  # Contacts
  flutter_contacts: ^1.1.7+1

  # Internationalisation
  intl: ^0.20.2
  supabase_flutter: ^2.14.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/